<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <defs>
    <!-- Gold gradient for central elements -->
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <!-- Deep blue gradient -->
    <linearGradient id="deepBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d1442"/>
    </linearGradient>

    <!-- Teal gradient for feathers -->
    <linearGradient id="tealGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004d4d"/>
      <stop offset="50%" stop-color="#008080"/>
      <stop offset="100%" stop-color="#004d4d"/>
    </linearGradient>

    <!-- Feather eye pattern -->
    <symbol id="featherEye" viewBox="0 0 20 20">
      <ellipse cx="10" cy="10" rx="9" ry="9" fill="#004d4d" stroke="#D4AF37" stroke-width="0.5"/>
      <ellipse cx="10" cy="10" rx="6" ry="6" fill="#006666"/>
      <ellipse cx="10" cy="10" rx="4" ry="4" fill="#1a237e"/>
      <circle cx="10" cy="10" r="2" fill="#D4AF37"/>
    </symbol>

    <!-- Geometric diamond motif -->
    <symbol id="diamond" viewBox="0 0 10 16">
      <polygon points="5,0 10,8 5,16 0,8" fill="url(#goldShine)" stroke="#B8860B" stroke-width="0.3"/>
    </symbol>
  </defs>

  <!-- Background - deep navy -->
  <rect width="320" height="100" fill="#0a0f2e"/>

  <!-- Decorative border frame -->
  <rect x="2" y="2" width="316" height="96" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
  <rect x="5" y="5" width="310" height="90" fill="none" stroke="#8B7355" stroke-width="0.5"/>

  <!-- Left wing section - geometric feather array -->
  <g id="leftWing">
    <!-- Chevron feather pattern -->
    <polygon points="10,50 35,25 45,50 35,75" fill="url(#tealGlow)" stroke="#006666" stroke-width="0.5"/>
    <polygon points="25,50 50,20 62,50 50,80" fill="#005959" stroke="#008080" stroke-width="0.5"/>
    <polygon points="42,50 70,15 85,50 70,85" fill="url(#deepBlue)" stroke="#1a237e" stroke-width="0.5"/>

    <!-- Feather eyes on left -->
    <use href="#featherEye" x="18" y="38" width="14" height="14"/>
    <use href="#featherEye" x="35" y="28" width="12" height="12"/>
    <use href="#featherEye" x="35" y="58" width="12" height="12"/>
    <use href="#featherEye" x="55" y="18" width="10" height="10"/>
    <use href="#featherEye" x="55" y="42" width="10" height="10"/>
    <use href="#featherEye" x="55" y="66" width="10" height="10"/>
  </g>

  <!-- Right wing section - mirrored -->
  <g id="rightWing" transform="translate(320,0) scale(-1,1)">
    <polygon points="10,50 35,25 45,50 35,75" fill="url(#tealGlow)" stroke="#006666" stroke-width="0.5"/>
    <polygon points="25,50 50,20 62,50 50,80" fill="#005959" stroke="#008080" stroke-width="0.5"/>
    <polygon points="42,50 70,15 85,50 70,85" fill="url(#deepBlue)" stroke="#1a237e" stroke-width="0.5"/>

    <use href="#featherEye" x="18" y="38" width="14" height="14"/>
    <use href="#featherEye" x="35" y="28" width="12" height="12"/>
    <use href="#featherEye" x="35" y="58" width="12" height="12"/>
    <use href="#featherEye" x="55" y="18" width="10" height="10"/>
    <use href="#featherEye" x="55" y="42" width="10" height="10"/>
    <use href="#featherEye" x="55" y="66" width="10" height="10"/>
  </g>

  <!-- Central peacock body - geometric abstraction -->
  <g id="peacockBody">
    <!-- Body hexagonal form -->
    <polygon points="160,85 145,65 145,40 160,25 175,40 175,65"
             fill="url(#deepBlue)" stroke="#D4AF37" stroke-width="1"/>

    <!-- Chest diamond pattern -->
    <polygon points="160,70 152,55 160,40 168,55" fill="#008080" stroke="#006666" stroke-width="0.5"/>
    <polygon points="160,62 155,52 160,42 165,52" fill="url(#goldShine)"/>

    <!-- Neck extension -->
    <rect x="156" y="20" width="8" height="18" fill="url(#deepBlue)" stroke="#D4AF37" stroke-width="0.5"/>

    <!-- Head - geometric circle -->
    <circle cx="160" cy="15" r="8" fill="#1a237e" stroke="#D4AF37" stroke-width="1"/>
    <circle cx="160" cy="15" r="5" fill="#006666"/>
    <circle cx="160" cy="15" r="2.5" fill="url(#goldShine)"/>

    <!-- Crown/crest - three geometric spikes -->
    <polygon points="160,5 158,10 162,10" fill="#D4AF37"/>
    <polygon points="154,7 153,12 157,11" fill="#B8860B"/>
    <polygon points="166,7 163,11 167,12" fill="#B8860B"/>

    <!-- Beak -->
    <polygon points="160,18 157,22 163,22" fill="#D4AF37"/>
  </g>

  <!-- Inner feather fan - radiating from body -->
  <g id="innerFan">
    <!-- Left radiating lines -->
    <line x1="145" y1="50" x2="90" y2="30" stroke="#D4AF37" stroke-width="0.8"/>
    <line x1="145" y1="55" x2="85" y2="50" stroke="#B8860B" stroke-width="0.6"/>
    <line x1="145" y1="60" x2="90" y2="70" stroke="#D4AF37" stroke-width="0.8"/>

    <!-- Right radiating lines -->
    <line x1="175" y1="50" x2="230" y2="30" stroke="#D4AF37" stroke-width="0.8"/>
    <line x1="175" y1="55" x2="235" y2="50" stroke="#B8860B" stroke-width="0.6"/>
    <line x1="175" y1="60" x2="230" y2="70" stroke="#D4AF37" stroke-width="0.8"/>
  </g>

  <!-- Outer decorative band - top -->
  <g id="topBand">
    <rect x="8" y="8" width="304" height="4" fill="#004040"/>
    <use href="#diamond" x="15" y="4" width="5" height="8"/>
    <use href="#diamond" x="30" y="4" width="5" height="8"/>
    <use href="#diamond" x="285" y="4" width="5" height="8"/>
    <use href="#diamond" x="300" y="4" width="5" height="8"/>

    <!-- Central top ornament -->
    <circle cx="160" cy="10" r="2" fill="#D4AF37"/>
    <circle cx="150" cy="10" r="1.5" fill="#008080"/>
    <circle cx="170" cy="10" r="1.5" fill="#008080"/>
  </g>

  <!-- Outer decorative band - bottom -->
  <g id="bottomBand">
    <rect x="8" y="88" width="304" height="4" fill="#004040"/>
    <use href="#diamond" x="15" y="84" width="5" height="8"/>
    <use href="#diamond" x="30" y="84" width="5" height="8"/>
    <use href="#diamond" x="285" y="84" width="5" height="8"/>
    <use href="#diamond" x="300" y="84" width="5" height="8"/>

    <!-- Central bottom ornament -->
    <circle cx="160" cy="90" r="2" fill="#D4AF37"/>
    <circle cx="150" cy="90" r="1.5" fill="#008080"/>
    <circle cx="170" cy="90" r="1.5" fill="#008080"/>
  </g>

  <!-- Secondary feather eyes in mid-ground -->
  <g id="midFeathers">
    <!-- Left mid section -->
    <use href="#featherEye" x="80" y="32" width="16" height="16"/>
    <use href="#featherEye" x="95" y="45" width="14" height="14"/>
    <use href="#featherEye" x="80" y="56" width="16" height="16"/>
    <use href="#featherEye" x="105" y="25" width="12" height="12"/>
    <use href="#featherEye" x="105" y="62" width="12" height="12"/>

    <!-- Right mid section -->
    <use href="#featherEye" x="224" y="32" width="16" height="16"/>
    <use href="#featherEye" x="211" y="45" width="14" height="14"/>
    <use href="#featherEye" x="224" y="56" width="16" height="16"/>
    <use href="#featherEye" x="203" y="25" width="12" height="12"/>
    <use href="#featherEye" x="203" y="62" width="12" height="12"/>
  </g>

  <!-- Vertical accent lines - Prairie style -->
  <g id="verticalAccents" stroke="#D4AF37" stroke-width="0.5">
    <line x1="120" y1="12" x2="120" y2="88"/>
    <line x1="200" y1="12" x2="200" y2="88"/>
    <line x1="125" y1="15" x2="125" y2="85" stroke="#006666"/>
    <line x1="195" y1="15" x2="195" y2="85" stroke="#006666"/>
  </g>

  <!-- Corner ornaments - geometric squares -->
  <g id="corners" fill="url(#goldShine)">
    <rect x="10" y="10" width="6" height="6" rx="1"/>
    <rect x="304" y="10" width="6" height="6" rx="1"/>
    <rect x="10" y="84" width="6" height="6" rx="1"/>
    <rect x="304" y="84" width="6" height="6" rx="1"/>
  </g>

  <!-- Emerald accent elements -->
  <g id="emeraldAccents" fill="#2e8b57">
    <circle cx="130" cy="50" r="3" stroke="#228b22" stroke-width="0.5"/>
    <circle cx="190" cy="50" r="3" stroke="#228b22" stroke-width="0.5"/>
    <ellipse cx="140" cy="35" rx="2" ry="3"/>
    <ellipse cx="180" cy="35" rx="2" ry="3"/>
    <ellipse cx="140" cy="65" rx="2" ry="3"/>
    <ellipse cx="180" cy="65" rx="2" ry="3"/>
  </g>

  <!-- Final gold highlight strokes -->
  <g id="goldHighlights" stroke="#FFD700" stroke-width="0.3" fill="none">
    <path d="M145,40 Q160,30 175,40"/>
    <path d="M145,65 Q160,75 175,65"/>
  </g>
</svg>