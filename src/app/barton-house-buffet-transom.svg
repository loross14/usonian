<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <defs>
    <!-- Lead came line style -->
    <style>
      .lead { fill: #1a1a1a; }
      .lead-line { stroke: #1a1a1a; stroke-width: 1.5; fill: none; }
    </style>

    <!-- Chevron pattern unit -->
    <g id="chevron-unit">
      <!-- Central amber chevron pointing up -->
      <polygon points="0,-18 8,0 0,18 -8,0" fill="#D4A456"/>
      <!-- Inner detail -->
      <polygon points="0,-10 4,0 0,10 -4,0" fill="#C4944A"/>
    </g>

    <!-- Double chevron group -->
    <g id="chevron-pair">
      <use href="#chevron-unit" x="0" y="0"/>
    </g>
  </defs>

  <!-- Background - cream/off-white -->
  <rect width="320" height="100" fill="#F5ECD7"/>

  <!-- === BORDER FRAME === -->
  <!-- Outer brown border -->
  <rect x="0" y="0" width="320" height="100" fill="none" stroke="#5C4033" stroke-width="4"/>
  <!-- Inner border accent -->
  <rect x="4" y="4" width="312" height="92" fill="none" stroke="#8B7355" stroke-width="2"/>

  <!-- === HORIZONTAL BANDS === -->
  <!-- Top olive green band -->
  <rect x="8" y="8" width="304" height="8" fill="#6B7B4C"/>
  <!-- Bottom olive green band -->
  <rect x="8" y="84" width="304" height="8" fill="#6B7B4C"/>

  <!-- Secondary horizontal lines -->
  <rect x="8" y="18" width="304" height="2" fill="#8B7355"/>
  <rect x="8" y="80" width="304" height="2" fill="#8B7355"/>

  <!-- === CENTRAL DESIGN AREA === -->
  <!-- Cream background panels between chevrons -->
  <rect x="10" y="22" width="300" height="56" fill="#EDE4CC"/>

  <!-- === CHEVRON COLUMNS === -->
  <!-- Pattern: 8 chevron units evenly spaced -->

  <!-- Chevron 1 -->
  <g transform="translate(30, 50)">
    <polygon points="0,-24 10,0 0,24 -10,0" fill="#D4A456"/>
    <polygon points="0,-16 6,0 0,16 -6,0" fill="#C99A3D"/>
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#6B7B4C"/>
  </g>

  <!-- Chevron 2 -->
  <g transform="translate(70, 50)">
    <polygon points="0,-24 10,0 0,24 -10,0" fill="#6B7B4C"/>
    <polygon points="0,-16 6,0 0,16 -6,0" fill="#7D8B5A"/>
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#D4A456"/>
  </g>

  <!-- Chevron 3 -->
  <g transform="translate(110, 50)">
    <polygon points="0,-24 10,0 0,24 -10,0" fill="#D4A456"/>
    <polygon points="0,-16 6,0 0,16 -6,0" fill="#C99A3D"/>
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#6B7B4C"/>
  </g>

  <!-- Center Left Chevron 4 -->
  <g transform="translate(145, 50)">
    <polygon points="0,-26 12,0 0,26 -12,0" fill="#5C4033"/>
    <polygon points="0,-18 8,0 0,18 -8,0" fill="#D4A456"/>
    <polygon points="0,-10 5,0 0,10 -5,0" fill="#C99A3D"/>
    <polygon points="0,-4 2,0 0,4 -2,0" fill="#8B7355"/>
  </g>

  <!-- CENTER FOCAL ELEMENT -->
  <g transform="translate(160, 50)">
    <!-- Large center diamond -->
    <polygon points="0,-28 14,0 0,28 -14,0" fill="#8B7355"/>
    <polygon points="0,-22 10,0 0,22 -10,0" fill="#D4A456"/>
    <polygon points="0,-14 7,0 0,14 -7,0" fill="#C99A3D"/>
    <polygon points="0,-8 4,0 0,8 -4,0" fill="#6B7B4C"/>
    <polygon points="0,-3 2,0 0,3 -2,0" fill="#5C4033"/>
  </g>

  <!-- Center Right Chevron 5 -->
  <g transform="translate(175, 50)">
    <polygon points="0,-26 12,0 0,26 -12,0" fill="#5C4033"/>
    <polygon points="0,-18 8,0 0,18 -8,0" fill="#D4A456"/>
    <polygon points="0,-10 5,0 0,10 -5,0" fill="#C99A3D"/>
    <polygon points="0,-4 2,0 0,4 -2,0" fill="#8B7355"/>
  </g>

  <!-- Chevron 6 -->
  <g transform="translate(210, 50)">
    <polygon points="0,-24 10,0 0,24 -10,0" fill="#D4A456"/>
    <polygon points="0,-16 6,0 0,16 -6,0" fill="#C99A3D"/>
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#6B7B4C"/>
  </g>

  <!-- Chevron 7 -->
  <g transform="translate(250, 50)">
    <polygon points="0,-24 10,0 0,24 -10,0" fill="#6B7B4C"/>
    <polygon points="0,-16 6,0 0,16 -6,0" fill="#7D8B5A"/>
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#D4A456"/>
  </g>

  <!-- Chevron 8 -->
  <g transform="translate(290, 50)">
    <polygon points="0,-24 10,0 0,24 -10,0" fill="#D4A456"/>
    <polygon points="0,-16 6,0 0,16 -6,0" fill="#C99A3D"/>
    <polygon points="0,-8 3,0 0,8 -3,0" fill="#6B7B4C"/>
  </g>

  <!-- === VERTICAL DIVIDER LINES (Lead Came) === -->
  <line x1="50" y1="20" x2="50" y2="80" class="lead-line"/>
  <line x1="90" y1="20" x2="90" y2="80" class="lead-line"/>
  <line x1="130" y1="20" x2="130" y2="80" class="lead-line"/>
  <line x1="160" y1="20" x2="160" y2="80" class="lead-line" stroke-width="2"/>
  <line x1="190" y1="20" x2="190" y2="80" class="lead-line"/>
  <line x1="230" y1="20" x2="230" y2="80" class="lead-line"/>
  <line x1="270" y1="20" x2="270" y2="80" class="lead-line"/>

  <!-- === CORNER ACCENTS === -->
  <!-- Top left corner block -->
  <rect x="8" y="8" width="12" height="8" fill="#5C4033"/>
  <!-- Top right corner block -->
  <rect x="300" y="8" width="12" height="8" fill="#5C4033"/>
  <!-- Bottom left corner block -->
  <rect x="8" y="84" width="12" height="8" fill="#5C4033"/>
  <!-- Bottom right corner block -->
  <rect x="300" y="84" width="12" height="8" fill="#5C4033"/>

  <!-- === SMALL GEOMETRIC ACCENTS === -->
  <!-- Small squares at horizontal band intersections -->
  <rect x="48" y="16" width="4" height="4" fill="#D4A456"/>
  <rect x="88" y="16" width="4" height="4" fill="#D4A456"/>
  <rect x="128" y="16" width="4" height="4" fill="#D4A456"/>
  <rect x="158" y="16" width="4" height="4" fill="#5C4033"/>
  <rect x="188" y="16" width="4" height="4" fill="#D4A456"/>
  <rect x="228" y="16" width="4" height="4" fill="#D4A456"/>
  <rect x="268" y="16" width="4" height="4" fill="#D4A456"/>

  <!-- Bottom accents -->
  <rect x="48" y="80" width="4" height="4" fill="#D4A456"/>
  <rect x="88" y="80" width="4" height="4" fill="#D4A456"/>
  <rect x="128" y="80" width="4" height="4" fill="#D4A456"/>
  <rect x="158" y="80" width="4" height="4" fill="#5C4033"/>
  <rect x="188" y="80" width="4" height="4" fill="#D4A456"/>
  <rect x="228" y="80" width="4" height="4" fill="#D4A456"/>
  <rect x="268" y="80" width="4" height="4" fill="#D4A456"/>

  <!-- === SIDE PANEL DETAILS === -->
  <!-- Left side vertical accent -->
  <rect x="12" y="20" width="6" height="60" fill="#8B7355"/>
  <rect x="14" y="25" width="2" height="50" fill="#D4A456"/>

  <!-- Right side vertical accent -->
  <rect x="302" y="20" width="6" height="60" fill="#8B7355"/>
  <rect x="304" y="25" width="2" height="50" fill="#D4A456"/>

  <!-- === SUBTLE TEXTURE OVERLAY === -->
  <!-- Faint horizontal lines suggesting wood grain influence -->
  <line x1="20" y1="35" x2="140" y2="35" stroke="#C4B89A" stroke-width="0.5" opacity="0.5"/>
  <line x1="20" y1="65" x2="140" y2="65" stroke="#C4B89A" stroke-width="0.5" opacity="0.5"/>
  <line x1="180" y1="35" x2="300" y2="35" stroke="#C4B89A" stroke-width="0.5" opacity="0.5"/>
  <line x1="180" y1="65" x2="300" y2="65" stroke="#C4B89A" stroke-width="0.5" opacity="0.5"/>
</svg>