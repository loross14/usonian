<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <!-- Gradient for warm light glow effect -->
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C864" stop-opacity="1"/>
      <stop offset="50%" stop-color="#D4A843" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#C49A3A" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="goldGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5DEB3" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#E8C864" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F5DEB3" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="creamGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8DC" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#F5DEB3" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Subtle texture for glass panels -->
    <filter id="glassTexture" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise"/>
      <feColorMatrix type="saturate" values="0" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="soft-light"/>
    </filter>

    <!-- Warm backlight glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFF8DC" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E8C864" stop-opacity="0"/>
    </radialGradient>

    <style>
      @keyframes shimmer {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.92; }
      }
      .glass-panel { animation: shimmer 6s ease-in-out infinite; }
      .caming { fill: none; stroke: #4A3728; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <!-- Background - dark border frame -->
  <rect width="320" height="100" fill="#2D2318"/>

  <!-- Outer wood/zinc frame -->
  <rect x="3" y="3" width="314" height="94" fill="#3D2F24" stroke="#4A3728" stroke-width="1"/>

  <!-- Inner illumination glow layer -->
  <rect x="6" y="6" width="308" height="88" fill="url(#centerGlow)"/>

  <!-- === MAIN GLASS FIELD === -->
  <!-- Base cream field with texture -->
  <rect x="6" y="6" width="308" height="88" fill="url(#creamGlow)" filter="url(#glassTexture)" class="glass-panel"/>

  <!-- === CENTRAL GEOMETRIC MOTIF === -->
  <!-- Central vertical axis - golden rectangle composition -->
  <g class="central-motif">
    <!-- Central vertical amber bar -->
    <rect x="155" y="10" width="10" height="80" fill="url(#amberGlow)" class="glass-panel"/>

    <!-- Horizontal golden band - primary -->
    <rect x="40" y="42" width="240" height="16" fill="url(#goldGlow)" class="glass-panel"/>

    <!-- Central diamond/chevron accent -->
    <polygon points="160,30 175,50 160,70 145,50" fill="#D4A843" class="glass-panel"/>

    <!-- Inner diamond highlight -->
    <polygon points="160,38 168,50 160,62 152,50" fill="#F5DEB3" opacity="0.8" class="glass-panel"/>
  </g>

  <!-- === HORIZONTAL BANDING - Left Section === -->
  <g class="left-section">
    <!-- Upper horizontal bars -->
    <rect x="10" y="15" width="130" height="8" fill="#E8C864" opacity="0.85" class="glass-panel"/>
    <rect x="10" y="28" width="130" height="6" fill="#D4A843" opacity="0.9" class="glass-panel"/>

    <!-- Lower horizontal bars -->
    <rect x="10" y="66" width="130" height="6" fill="#D4A843" opacity="0.9" class="glass-panel"/>
    <rect x="10" y="77" width="130" height="8" fill="#E8C864" opacity="0.85" class="glass-panel"/>

    <!-- Vertical accent bars - left side -->
    <rect x="25" y="10" width="5" height="80" fill="#C49A3A" opacity="0.7" class="glass-panel"/>
    <rect x="55" y="10" width="5" height="80" fill="#C49A3A" opacity="0.7" class="glass-panel"/>
    <rect x="95" y="10" width="5" height="80" fill="#C49A3A" opacity="0.7" class="glass-panel"/>
    <rect x="125" y="10" width="5" height="80" fill="#C49A3A" opacity="0.7" class="glass-panel"/>
  </g>

  <!-- === HORIZONTAL BANDING - Right Section === -->
  <g class="right-section">
    <!-- Upper horizontal bars -->
    <rect x="180" y="15" width="130" height="8" fill="#E8C864" opacity="0.85" class="glass-panel"/>
    <rect x="180" y="28" width="130" height="6" fill="#D4A843" opacity="0.9" class="glass-panel"/>

    <!-- Lower horizontal bars -->
    <rect x="180" y="66" width="130" height="6" fill="#D4A843" opacity="0.9" class="glass-panel"/>
    <rect x="180" y="77" width="130" height="8" fill="#E8C864" opacity="0.85" class="glass-panel"/>

    <!-- Vertical accent bars - right side -->
    <rect x="190" y="10" width="5" height="80" fill="#C49A3A" opacity="0.7" class="glass-panel"/>
    <rect x="220" y="10" width="5" height="80" fill="#C49A3A" opacity="0.7" class="glass-panel"/>
    <rect x="260" y="10" width="5" height="80" fill="#C49A3A" opacity="0.7" class="glass-panel"/>
    <rect x="290" y="10" width="5" height="80" fill="#C49A3A" opacity="0.7" class="glass-panel"/>
  </g>

  <!-- === CORNER ACCENT SQUARES === -->
  <g class="corner-accents">
    <!-- Top left corner squares -->
    <rect x="10" y="10" width="12" height="12" fill="#D4A843" class="glass-panel"/>
    <rect x="12" y="12" width="8" height="8" fill="#F5DEB3" opacity="0.9"/>

    <!-- Top right corner squares -->
    <rect x="298" y="10" width="12" height="12" fill="#D4A843" class="glass-panel"/>
    <rect x="300" y="12" width="8" height="8" fill="#F5DEB3" opacity="0.9"/>

    <!-- Bottom left corner squares -->
    <rect x="10" y="78" width="12" height="12" fill="#D4A843" class="glass-panel"/>
    <rect x="12" y="80" width="8" height="8" fill="#F5DEB3" opacity="0.9"/>

    <!-- Bottom right corner squares -->
    <rect x="298" y="78" width="12" height="12" fill="#D4A843" class="glass-panel"/>
    <rect x="300" y="80" width="8" height="8" fill="#F5DEB3" opacity="0.9"/>
  </g>

  <!-- === SECONDARY ACCENT SQUARES (along central band) === -->
  <g class="secondary-accents">
    <rect x="70" y="45" width="10" height="10" fill="#E8C864" class="glass-panel"/>
    <rect x="110" y="45" width="10" height="10" fill="#E8C864" class="glass-panel"/>
    <rect x="200" y="45" width="10" height="10" fill="#E8C864" class="glass-panel"/>
    <rect x="240" y="45" width="10" height="10" fill="#E8C864" class="glass-panel"/>
  </g>

  <!-- === ZINC CAMING (Lead Lines) === -->
  <!-- Outer border caming -->
  <rect x="6" y="6" width="308" height="88" class="caming" stroke-width="3"/>

  <!-- Primary horizontal caming -->
  <line x1="6" y1="40" x2="140" y2="40" class="caming" stroke-width="2"/>
  <line x1="180" y1="40" x2="314" y2="40" class="caming" stroke-width="2"/>
  <line x1="6" y1="60" x2="140" y2="60" class="caming" stroke-width="2"/>
  <line x1="180" y1="60" x2="314" y2="60" class="caming" stroke-width="2"/>

  <!-- Central band caming -->
  <line x1="40" y1="42" x2="40" y2="58" class="caming" stroke-width="2"/>
  <line x1="280" y1="42" x2="280" y2="58" class="caming" stroke-width="2"/>

  <!-- Secondary horizontal caming -->
  <line x1="6" y1="24" x2="140" y2="24" class="caming" stroke-width="1.5"/>
  <line x1="180" y1="24" x2="314" y2="24" class="caming" stroke-width="1.5"/>
  <line x1="6" y1="76" x2="140" y2="76" class="caming" stroke-width="1.5"/>
  <line x1="180" y1="76" x2="314" y2="76" class="caming" stroke-width="1.5"/>

  <!-- Vertical caming - left section -->
  <line x1="25" y1="6" x2="25" y2="94" class="caming" stroke-width="1.5"/>
  <line x1="55" y1="6" x2="55" y2="94" class="caming" stroke-width="1.5"/>
  <line x1="95" y1="6" x2="95" y2="94" class="caming" stroke-width="1.5"/>
  <line x1="125" y1="6" x2="125" y2="94" class="caming" stroke-width="1.5"/>
  <line x1="140" y1="6" x2="140" y2="94" class="caming" stroke-width="2"/>

  <!-- Vertical caming - central -->
  <line x1="153" y1="6" x2="153" y2="94" class="caming" stroke-width="2"/>
  <line x1="167" y1="6" x2="167" y2="94" class="caming" stroke-width="2"/>

  <!-- Vertical caming - right section -->
  <line x1="180" y1="6" x2="180" y2="94" class="caming" stroke-width="2"/>
  <line x1="195" y1="6" x2="195" y2="94" class="caming" stroke-width="1.5"/>
  <line x1="225" y1="6" x2="225" y2="94" class="caming" stroke-width="1.5"/>
  <line x1="265" y1="6" x2="265" y2="94" class="caming" stroke-width="1.5"/>
  <line x1="295" y1="6" x2="295" y2="94" class="caming" stroke-width="1.5"/>

  <!-- Central diamond caming -->
  <polygon points="160,30 175,50 160,70 145,50" class="caming" stroke-width="2"/>

  <!-- Corner square caming -->
  <rect x="10" y="10" width="12" height="12" class="caming" stroke-width="1.5"/>
  <rect x="298" y="10" width="12" height="12" class="caming" stroke-width="1.5"/>
  <rect x="10" y="78" width="12" height="12" class="caming" stroke-width="1.5"/>
  <rect x="298" y="78" width="12" height="12" class="caming" stroke-width="1.5"/>

  <!-- Accent square caming on central band -->
  <rect x="70" y="45" width="10" height="10" class="caming" stroke-width="1"/>
  <rect x="110" y="45" width="10" height="10" class="caming" stroke-width="1"/>
  <rect x="200" y="45" width="10" height="10" class="caming" stroke-width="1"/>
  <rect x="240" y="45" width="10" height="10" class="caming" stroke-width="1"/>

  <!-- Additional detail caming for depth -->
  <line x1="6" y1="35" x2="25" y2="35" class="caming" stroke-width="1"/>
  <line x1="6" y1="65" x2="25" y2="65" class="caming" stroke-width="1"/>
  <line x1="295" y1="35" x2="314" y2="35" class="caming" stroke-width="1"/>
  <line x1="295" y1="65" x2="314" y2="65" class="caming" stroke-width="1"/>
</svg>