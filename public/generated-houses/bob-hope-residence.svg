<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <style>
      
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }
        .accent { animation: pulse 4s ease-in-out infinite; }
    
    </style>
  </defs>

  <!-- White Background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Desert ground - edge to edge -->
  <rect x="0" y="215" width="400" height="85" fill="rgb(140, 155, 175)" opacity="0.5"/>

  <g class="house-main">
    <!-- Low-slung main structure - wider -->
    <rect x="10" y="155" width="380" height="60" fill="rgb(252, 250, 247)" stroke="rgb(55, 52, 50)" stroke-width="1"/>

    <!-- Butterfly/angled roof - edge to edge -->
    <polygon
      points="-10,155 200,130 200,145 -10,165"
      fill="rgb(168, 132, 98)"
      class="accent"
    />
    <polygon
      points="200,130 410,165 410,175 200,145"
      fill="rgb(168, 132, 98)"
      class="accent"
    />

    <!-- Roof edge line -->
    <line x1="-10" y1="155" x2="200" y2="130" stroke="rgb(55, 52, 50)" stroke-width="3" class="line-draw"/>
    <line x1="200" y1="130" x2="410" y2="165" stroke="rgb(55, 52, 50)" stroke-width="3" class="line-draw"/>

    <!-- Floor-to-ceiling glass - wider -->
    <g class="windows">
      <rect x="30" y="160" width="150" height="50" fill="rgb(212, 178, 112)" opacity="0.5"/>
      <rect x="220" y="160" width="150" height="50" fill="rgb(212, 178, 112)" opacity="0.5"/>
    </g>

    <!-- Vertical mullions -->
    <line x1="70" y1="160" x2="70" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    <line x1="110" y1="160" x2="110" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    <line x1="150" y1="160" x2="150" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    <line x1="260" y1="160" x2="260" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    <line x1="300" y1="160" x2="300" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    <line x1="340" y1="160" x2="340" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>

    <!-- Pool - wider -->
    <ellipse cx="200" cy="245" rx="100" ry="20" fill="rgb(195, 215, 232)" opacity="0.6"/>
  </g>

  <!-- Desert plants (abstract) - at edges -->
  <line x1="10" y1="215" x2="10" y2="180" stroke="rgb(168, 132, 98)" stroke-width="3" opacity="0.6"/>
  <line x1="3" y1="188" x2="10" y2="195" stroke="rgb(168, 132, 98)" stroke-width="2" opacity="0.6"/>
  <line x1="17" y1="190" x2="10" y2="197" stroke="rgb(168, 132, 98)" stroke-width="2" opacity="0.6"/>

  <line x1="392" y1="215" x2="392" y2="175" stroke="rgb(168, 132, 98)" stroke-width="3" opacity="0.6"/>
  <line x1="385" y1="185" x2="392" y2="192" stroke="rgb(168, 132, 98)" stroke-width="2" opacity="0.6"/>
</svg>