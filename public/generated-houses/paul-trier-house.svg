<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <style>
      
        @keyframes draw {
            from { stroke-dashoffset: 1000; }
            to { stroke-dashoffset: 0; }
        }
        .line-draw {
            stroke-dasharray: 1000;
            animation: draw 3s ease-out forwards;
        }
    
    </style>
    <linearGradient id="roof-grad-paul-tri" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgb(120, 72, 56);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(55, 52, 50);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- White Background -->
  <rect width="400" height="300" fill="white"/>

  <g class="house-main">
    <!-- Curved/dramatic roof - edge to edge -->
    <path
      d="M -10 175 Q 200 21 410 155 L 410 175 L -10 175 Z"
      fill="url(#roof-grad-paul-tri)"
      class="accent"
    />

    <!-- Main structure with angle - wider -->
    <polygon
      points="15,175 385,155 395,220 5,220"
      fill="rgb(205, 188, 162)"
    />

    <!-- Glass wall - wider -->
    <g class="windows">
      <rect x="35" y="165" width="280" height="45" fill="rgb(212, 178, 112)" opacity="0.6"/>
      <line x1="85" y1="165" x2="85" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="135" y1="165" x2="135" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="185" y1="165" x2="185" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="235" y1="165" x2="235" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="285" y1="165" x2="285" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    </g>

    <!-- Cantilevered element - extends past edge -->
    <rect x="330" y="140" width="80" height="15" fill="rgb(120, 72, 56)" class="accent"/>
    <line x1="330" y1="155" x2="410" y2="155" stroke="rgb(55, 52, 50)" stroke-width="2" class="line-draw"/>

    <!-- Support column (organic) -->
    <ellipse cx="370" cy="190" rx="10" ry="35" fill="rgb(55, 52, 50)"/>
  </g>

  <!-- Ground - edge to edge -->
  <path d="M 0 220 Q 100 215 200 220 Q 300 225 400 218 L 400 300 L 0 300 Z" fill="rgb(205, 188, 162)" opacity="0.4"/>
</svg>