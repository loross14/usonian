<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <style>
      
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .house-main { animation: float 6s ease-in-out infinite; }
    
    </style>
  </defs>

  <!-- White Background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Canyon below -->
  <path d="M 0 250 Q 100 240 200 260 Q 300 280 400 250 L 400 300 L 0 300 Z"
        fill="rgb(55, 52, 50)" opacity="0.15"/>

  <g class="house-main">
    <!-- The iconic parabolic/rainbow arch roof -->
    <path
      d="M 60 180 Q 200 30 340 180 L 340 200 Q 200 60 60 200 Z"
      fill="rgb(82, 90, 100)"
      class="accent"
    />

    <!-- Inner arch (roof thickness) -->
    <path
      d="M 75 180 Q 200 50 325 180"
      fill="none"
      stroke="rgb(55, 52, 50)"
      stroke-width="2"
    />

    <!-- Outer arch edge -->
    <path
      d="M 60 180 Q 200 30 340 180"
      fill="none"
      stroke="rgb(55, 52, 50)"
      stroke-width="3"
    />

    <!-- Main body beneath arch - almond shape -->
    <ellipse cx="200" cy="175" rx="120" ry="40" fill="rgb(252, 250, 247)" stroke="rgb(55, 52, 50)" stroke-width="1"/>

    <!-- Stained glass panels (the "rainbow" colors) -->
    <g class="windows">
      <!-- Colored glass segments -->
      <rect x="90" y="145" width="25" height="40" fill="rgb(194, 114, 84)" opacity="0.7"/>
      <rect x="120" y="135" width="25" height="50" fill="rgb(212, 178, 112)" opacity="0.7"/>
      <rect x="150" y="130" width="25" height="55" fill="rgb(212, 178, 112)" opacity="0.7"/>
      <rect x="180" y="128" width="40" height="57" fill="rgb(212, 178, 112)" opacity="0.6"/>
      <rect x="225" y="130" width="25" height="55" fill="rgb(212, 178, 112)" opacity="0.7"/>
      <rect x="255" y="135" width="25" height="50" fill="rgb(195, 215, 232)" opacity="0.7"/>
      <rect x="285" y="145" width="25" height="40" fill="rgb(194, 114, 84)" opacity="0.6"/>

      <!-- Window mullions -->
      <line x1="115" y1="145" x2="115" y2="185" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="145" y1="135" x2="145" y2="185" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="175" y1="130" x2="175" y2="185" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="220" y1="128" x2="220" y2="185" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="250" y1="130" x2="250" y2="185" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="280" y1="135" x2="280" y2="185" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    </g>

    <!-- V-shaped support stilts (60 feet above canyon) -->
    <!-- Left V-stilt -->
    <line x1="130" y1="200" x2="100" y2="280" stroke="rgb(55, 52, 50)" stroke-width="5"/>
    <line x1="130" y1="200" x2="160" y2="280" stroke="rgb(55, 52, 50)" stroke-width="5"/>

    <!-- Right V-stilt -->
    <line x1="270" y1="200" x2="240" y2="280" stroke="rgb(55, 52, 50)" stroke-width="5"/>
    <line x1="270" y1="200" x2="300" y2="280" stroke="rgb(55, 52, 50)" stroke-width="5"/>

    <!-- Central "hole" through arch framing view -->
    <ellipse cx="200" cy="85" rx="25" ry="15" fill="white" stroke="rgb(55, 52, 50)" stroke-width="1"/>
  </g>
</svg>