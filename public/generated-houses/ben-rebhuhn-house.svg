<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <style>
      
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .house-main { animation: breathe 8s ease-in-out infinite; transform-origin: center bottom; }
    
    </style>
  </defs>

  <!-- White Background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Hillside - edge to edge -->
  <path d="M -20 145 Q 100 185 220 220 L 420 260 L 420 300 L -20 300 Z" fill="rgb(168, 132, 98)" opacity="0.4"/>
  <path d="M -20 170 Q 80 205 180 240 L 420 280 L 420 300 L -20 300 Z" fill="rgb(168, 132, 98)" opacity="0.3"/>

  <g class="house-main">
    <!-- Cantilevered main volume - wider -->
    <rect x="60" y="100" width="300" height="75" fill="rgb(252, 250, 247)" stroke="rgb(55, 52, 50)" stroke-width="1"/>

    <!-- Roof plane - edge to edge -->
    <polygon
      points="50,100 370,100 385,92 35,92"
      fill="rgb(82, 90, 100)"
      class="accent"
    />

    <!-- Supporting structure going into hill -->
    <polygon
      points="180,175 240,175 255,250 165,230"
      fill="rgb(55, 52, 50)"
    />

    <!-- Cantilevered deck - extends to edge -->
    <rect x="290" y="170" width="120" height="10" fill="rgb(82, 90, 100)" class="accent"/>
    <line x1="290" y1="180" x2="410" y2="180" stroke="rgb(55, 52, 50)" stroke-width="2" class="line-draw"/>

    <!-- Glass facade - wider -->
    <g class="windows">
      <rect x="80" y="112" width="250" height="55" fill="rgb(212, 178, 112)" opacity="0.6"/>
    </g>

    <!-- Horizontal divisions -->
    <line x1="80" y1="140" x2="330" y2="140" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    <line x1="155" y1="112" x2="155" y2="167" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    <line x1="230" y1="112" x2="230" y2="167" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    <line x1="305" y1="112" x2="305" y2="167" stroke="rgb(55, 52, 50)" stroke-width="1"/>
  </g>

  <!-- Structural support lines -->
  <line x1="210" y1="175" x2="190" y2="225" stroke="rgb(55, 52, 50)" stroke-width="4"/>
</svg>