<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <style>
      
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }
        .accent { animation: pulse 4s ease-in-out infinite; }
    
    </style>
  </defs>

  <!-- White Background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Ground plane - extends to edges -->
  <rect x="0" y="210" width="400" height="90" fill="rgb(140, 155, 175)" opacity="0.3"/>

  <g class="house-main">
    <!-- Main horizontal wing - wider, extends near edges -->
    <rect x="5" y="140" width="300" height="70" fill="rgb(140, 155, 175)"/>
    <rect x="0" y="128" width="310" height="18" fill="rgb(168, 132, 98)" class="accent"/>

    <!-- Vertical wing (L-shape) - extends to right edge -->
    <rect x="260" y="85" width="120" height="125" fill="rgb(140, 155, 175)"/>
    <rect x="255" y="72" width="130" height="18" fill="rgb(168, 132, 98)" class="accent"/>

    <!-- Flat roof overhangs - edge to edge -->
    <rect x="-5" y="122" width="320" height="10" fill="rgb(55, 52, 50)"/>
    <rect x="250" y="66" width="145" height="10" fill="rgb(55, 52, 50)"/>

    <!-- Horizontal window band (clerestory) -->
    <g class="windows">
      <rect x="20" y="150" width="230" height="20" fill="rgb(212, 178, 112)" opacity="0.7"/>
      <rect x="280" y="95" width="75" height="55" fill="rgb(212, 178, 112)" opacity="0.7"/>
    </g>

    <!-- Vertical mullions -->
    <line x1="70" y1="150" x2="70" y2="170" stroke="rgb(55, 52, 50)" stroke-width="2"/>
    <line x1="120" y1="150" x2="120" y2="170" stroke="rgb(55, 52, 50)" stroke-width="2"/>
    <line x1="170" y1="150" x2="170" y2="170" stroke="rgb(55, 52, 50)" stroke-width="2"/>
    <line x1="220" y1="150" x2="220" y2="170" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Carport/terrace extension - extends past right edge -->
    <rect x="370" y="165" width="40" height="45" fill="rgb(140, 155, 175)" opacity="0.6"/>
    <rect x="365" y="158" width="45" height="10" fill="rgb(168, 132, 98)" opacity="0.7"/>
    <line x1="390" y1="158" x2="390" y2="210" stroke="rgb(55, 52, 50)" stroke-width="4"/>
  </g>

  <!-- Ground line -->
  <line x1="0" y1="210" x2="400" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1" class="line-draw"/>
</svg>