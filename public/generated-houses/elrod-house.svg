<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <style>
      
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .house-main { animation: breathe 8s ease-in-out infinite; transform-origin: center bottom; }
    
    </style>
    <radialGradient id="dome-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgb(232, 218, 195);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(82, 90, 100);stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- White Background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Desert ground -->
  <rect x="0" y="220" width="400" height="80" fill="rgb(232, 218, 195)" opacity="0.4"/>

  <g class="house-main">
    <!-- The iconic circular concrete dome - 60ft diameter represented -->
    <ellipse cx="200" cy="140" rx="160" ry="70" fill="url(#dome-grad)" class="accent"/>

    <!-- Dome outer ring -->
    <ellipse cx="200" cy="140" rx="160" ry="70" fill="none" stroke="rgb(55, 52, 50)" stroke-width="3"/>

    <!-- Radial concrete beams (9 beams fanning outward) -->
    <line x1="200" y1="140" x2="60" y2="100" stroke="rgb(55, 52, 50)" stroke-width="4"/>
    <line x1="200" y1="140" x2="90" y2="75" stroke="rgb(55, 52, 50)" stroke-width="4"/>
    <line x1="200" y1="140" x2="140" y2="72" stroke="rgb(55, 52, 50)" stroke-width="4"/>
    <line x1="200" y1="140" x2="200" y2="70" stroke="rgb(55, 52, 50)" stroke-width="4"/>
    <line x1="200" y1="140" x2="260" y2="72" stroke="rgb(55, 52, 50)" stroke-width="4"/>
    <line x1="200" y1="140" x2="310" y2="75" stroke="rgb(55, 52, 50)" stroke-width="4"/>
    <line x1="200" y1="140" x2="340" y2="100" stroke="rgb(55, 52, 50)" stroke-width="4"/>

    <!-- Clerestory windows between beams (triangular gold sections) -->
    <g class="windows">
      <polygon points="200,140 90,75 140,72" fill="rgb(212, 178, 112)" opacity="0.6"/>
      <polygon points="200,140 140,72 200,70" fill="rgb(212, 178, 112)" opacity="0.5"/>
      <polygon points="200,140 200,70 260,72" fill="rgb(212, 178, 112)" opacity="0.6"/>
      <polygon points="200,140 260,72 310,75" fill="rgb(212, 178, 112)" opacity="0.5"/>
    </g>

    <!-- Base structure / living area rim -->
    <ellipse cx="200" cy="180" rx="150" ry="35" fill="rgb(232, 218, 195)" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Natural boulders integrated into structure -->
    <ellipse cx="80" cy="190" rx="35" ry="25" fill="rgb(138, 105, 75)" opacity="0.7"/>
    <ellipse cx="95" cy="205" rx="25" ry="18" fill="rgb(138, 105, 75)" opacity="0.6"/>
    <ellipse cx="320" cy="185" rx="30" ry="22" fill="rgb(138, 105, 75)" opacity="0.7"/>

    <!-- Indoor-outdoor pool hint -->
    <ellipse cx="200" cy="200" rx="60" ry="15" fill="rgb(195, 215, 232)" opacity="0.5"/>

    <!-- Central column hint -->
    <circle cx="200" cy="140" r="12" fill="rgb(55, 52, 50)"/>
  </g>
</svg>