<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <style>
      
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .house-main { animation: breathe 8s ease-in-out infinite; transform-origin: center bottom; }
    
    </style>
    <linearGradient id="vault-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(82, 90, 100);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(100,105,115);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- White Background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Hillside - Silver Lake topography -->
  <path d="M 0 200 Q 100 180 200 210 Q 300 240 400 190 L 400 300 L 0 300 Z"
        fill="rgb(55, 52, 50)" opacity="0.15"/>

  <g class="house-main">
    <!-- The iconic billowing/arched concrete vault roof -->
    <path
      d="M 30 180 Q 200 50 370 180 L 370 195 Q 200 65 30 195 Z"
      fill="url(#vault-grad)"
      class="accent"
    />

    <!-- Roof edge emphasis -->
    <path
      d="M 30 180 Q 200 50 370 180"
      fill="none"
      stroke="rgb(55, 52, 50)"
      stroke-width="4"
    />

    <!-- Main glass wall beneath vault -->
    <g class="windows">
      <rect x="50" y="165" width="300" height="45" fill="rgb(212, 178, 112)" opacity="0.6"/>

      <!-- Floor-to-ceiling glass mullions -->
      <line x1="100" y1="165" x2="100" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="150" y1="165" x2="150" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="200" y1="165" x2="200" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="250" y1="165" x2="250" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="300" y1="165" x2="300" y2="210" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    </g>

    <!-- Curved brick end walls -->
    <path
      d="M 30 180 Q 25 190 30 210 L 50 210 L 50 165 Z"
      fill="rgb(194, 114, 84)"
    />
    <path
      d="M 370 180 Q 375 190 370 210 L 350 210 L 350 165 Z"
      fill="rgb(194, 114, 84)"
    />

    <!-- Four support columns under vault -->
    <rect x="90" y="165" width="8" height="45" fill="rgb(55, 52, 50)"/>
    <rect x="160" y="165" width="8" height="45" fill="rgb(55, 52, 50)"/>
    <rect x="232" y="165" width="8" height="45" fill="rgb(55, 52, 50)"/>
    <rect x="302" y="165" width="8" height="45" fill="rgb(55, 52, 50)"/>

    <!-- Cantilevered infinity pool -->
    <rect x="280" y="210" width="90" height="20" fill="rgb(195, 215, 232)" opacity="0.6"/>
    <line x1="280" y1="210" x2="370" y2="210" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Pool cantilever supports -->
    <line x1="310" y1="230" x2="310" y2="250" stroke="rgb(55, 52, 50)" stroke-width="3"/>
    <line x1="350" y1="230" x2="350" y2="245" stroke="rgb(55, 52, 50)" stroke-width="3"/>
  </g>
</svg>