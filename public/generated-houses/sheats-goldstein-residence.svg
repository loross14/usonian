<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <style>
      
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(212, 178, 112, 0.3)); }
            50% { filter: drop-shadow(0 0 8px rgba(212, 178, 112, 0.6)); }
        }
        .windows { animation: glow 5s ease-in-out infinite; }
    
    </style>
    <linearGradient id="canyon-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(168, 132, 98);stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:rgb(55, 52, 50);stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- White Background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Canyon/hillside below -->
  <path d="M 0 220 Q 100 200 200 230 Q 300 260 400 220 L 400 300 L 0 300 Z"
        fill="url(#canyon-grad)"/>

  <g class="house-main">
    <!-- Main triangular structure - LEFT triangle -->
    <polygon
      points="20,180 200,100 200,200"
      fill="rgb(168, 132, 98)"
      stroke="rgb(55, 52, 50)"
      stroke-width="1"
    />

    <!-- RIGHT triangle -->
    <polygon
      points="200,100 380,160 200,200"
      fill="rgb(168, 132, 98)"
      stroke="rgb(55, 52, 50)"
      stroke-width="1"
    />

    <!-- Triangular roof ridge - the zigzag roofline -->
    <polygon
      points="20,165 200,80 200,100 20,180"
      fill="rgb(82, 90, 100)"
      class="accent"
    />
    <polygon
      points="200,80 380,145 380,160 200,100"
      fill="rgb(82, 90, 100)"
      class="accent"
    />

    <!-- Bold roof edge lines (zigzag) -->
    <polyline
      points="20,165 200,80 380,145"
      fill="none"
      stroke="rgb(55, 52, 50)"
      stroke-width="3"
    />

    <!-- Glass walls - triangular panes -->
    <g class="windows">
      <!-- Left wing glass -->
      <polygon points="50,175 180,110 180,180" fill="rgb(212, 178, 112)" opacity="0.6"/>
      <!-- Right wing glass -->
      <polygon points="220,115 350,160 220,185" fill="rgb(212, 178, 112)" opacity="0.6"/>

      <!-- Angular mullion lines -->
      <line x1="90" y1="170" x2="180" y2="125" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="130" y1="175" x2="180" y2="145" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="260" y1="130" x2="260" y2="175" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <line x1="300" y1="145" x2="300" y2="175" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    </g>

    <!-- Coffered skylight details on roof -->
    <line x1="80" y1="172" x2="120" y2="152" stroke="rgb(212, 178, 112)" stroke-width="2" opacity="0.5"/>
    <line x1="140" y1="148" x2="170" y2="132" stroke="rgb(212, 178, 112)" stroke-width="2" opacity="0.5"/>
    <line x1="240" y1="105" x2="280" y2="120" stroke="rgb(212, 178, 112)" stroke-width="2" opacity="0.5"/>
    <line x1="300" y1="125" x2="340" y2="140" stroke="rgb(212, 178, 112)" stroke-width="2" opacity="0.5"/>

    <!-- Cantilevered base extending over canyon -->
    <polygon
      points="80,200 320,200 350,210 50,210"
      fill="rgb(55, 52, 50)"
      opacity="0.8"
    />
  </g>
</svg>