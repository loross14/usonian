<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .accent { animation: pulse 4s ease-in-out infinite; }
    .portrait-main { transform-origin: center center; }
    </style>
    <linearGradient id="face-grad-tafel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(232, 218, 195);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(168, 132, 98);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Warm White Background -->
  <rect width="400" height="400" fill="rgb(252, 250, 247)"/>

  <!-- Drafting tools background -->
  <g class="building-accent" opacity="0.12" transform="translate(0, 0)">
    <!-- T-square -->
    <rect x="50" y="60" width="300" height="8" fill="rgb(168, 132, 98)"/>
    <rect x="50" y="55" width="15" height="80" fill="rgb(168, 132, 98)"/>
    <!-- Triangle -->
    <polygon points="280,320 350,380 210,380" fill="none" stroke="rgb(55, 52, 50)" stroke-width="2"/>
    <!-- Compass hint -->
    <circle cx="110" cy="340" r="30" fill="none" stroke="rgb(212, 178, 112)" stroke-width="2"/>
  </g>

  <!-- Portrait -->
  <g class="portrait-main" transform="translate(0, 0)">
    <!-- Face - Classic hexagonal -->
    <polygon points="200,105 260,140 265,230 245,280 200,300 155,280 135,230 140,140"
      fill="url(#face-grad-tafel)" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Hair - Receding, distinguished -->
    <polygon points="150,130 170,100 230,100 250,130 240,115 200,105 160,115"
      fill="rgb(82, 90, 100)"/>

    <!-- Forehead wrinkles - wisdom lines -->
    <line x1="170" y1="125" x2="230" y2="125" stroke="rgb(55, 52, 50)" stroke-width="1" opacity="0.4"/>
    <line x1="175" y1="132" x2="225" y2="132" stroke="rgb(55, 52, 50)" stroke-width="1" opacity="0.3"/>

    <!-- Eyes - Thoughtful rectangles -->
    <rect x="155" y="170" width="30" height="14" fill="rgb(55, 52, 50)" rx="2"/>
    <rect x="215" y="170" width="30" height="14" fill="rgb(55, 52, 50)" rx="2"/>
    <rect x="158" y="173" width="8" height="5" fill="rgb(212, 178, 112)" class="accent"/>
    <rect x="218" y="173" width="8" height="5" fill="rgb(212, 178, 112)" class="accent"/>

    <!-- Eyebrows - Distinguished -->
    <line x1="152" y1="160" x2="188" y2="158" stroke="rgb(55, 52, 50)" stroke-width="3"/>
    <line x1="212" y1="158" x2="248" y2="160" stroke="rgb(55, 52, 50)" stroke-width="3"/>

    <!-- Nose - Classic proportions -->
    <polygon points="200,185 212,230 200,235 188,230" fill="rgb(138, 105, 75)"/>

    <!-- Mouth - Slight smile -->
    <path d="M 178 255 Q 200 262 222 255" fill="none" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Bow tie - Classic drafting room attire -->
    <polygon points="165,315 185,305 185,325" fill="rgb(194, 114, 84)"/>
    <polygon points="235,315 215,305 215,325" fill="rgb(194, 114, 84)"/>
    <circle cx="200" cy="315" r="8" fill="rgb(156, 88, 64)"/>

    <!-- Collar and jacket -->
    <polygon points="155,300 185,305 140,380 100,380" fill="rgb(55, 52, 50)"/>
    <polygon points="245,300 215,305 260,380 300,380" fill="rgb(55, 52, 50)"/>
    <polygon points="185,305 200,340 215,305" fill="rgb(252, 250, 247)"/>
  </g>

  <!-- Drafting pencil accent -->
  <g class="accent" transform="translate(0, 0)">
    <rect x="260" y="350" width="80" height="6" fill="rgb(212, 178, 112)" transform="rotate(-15, 300, 353)"/>
    <polygon points="342,348 355,353 342,358" fill="rgb(55, 52, 50)" transform="rotate(-15, 300, 353)"/>
  </g>
</svg>