<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .accent { animation: pulse 4s ease-in-out infinite; }
    .portrait-main { transform-origin: center center; }
    </style>
    <linearGradient id="face-grad-kahn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(232, 218, 195);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(168, 132, 98);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Warm White Background -->
  <rect width="800" height="400" fill="rgb(252, 250, 247)"/>

  <!-- Industrial factory elements background (Ford Plant reference) -->
  <g class="building-accent" opacity="0.12" transform="translate(200, 0)">
    <!-- Steel I-beam structure -->
    <rect x="260" y="30" width="12" height="120" fill="rgb(55, 52, 50)"/>
    <rect x="528" y="30" width="12" height="120" fill="rgb(55, 52, 50)"/>
    <rect x="260" y="30" width="280" height="10" fill="rgb(55, 52, 50)"/>
    <rect x="260" y="70" width="280" height="8" fill="rgb(82, 90, 100)"/>
    <rect x="260" y="110" width="280" height="8" fill="rgb(82, 90, 100)"/>

    <!-- Factory windows grid -->
    <rect x="290" y="42" width="25" height="25" fill="rgb(212, 178, 112)" opacity="0.5"/>
    <rect x="325" y="42" width="25" height="25" fill="rgb(212, 178, 112)" opacity="0.5"/>
    <rect x="360" y="42" width="25" height="25" fill="rgb(212, 178, 112)" opacity="0.5"/>
    <rect x="415" y="42" width="25" height="25" fill="rgb(212, 178, 112)" opacity="0.5"/>
    <rect x="450" y="42" width="25" height="25" fill="rgb(212, 178, 112)" opacity="0.5"/>
    <rect x="485" y="42" width="25" height="25" fill="rgb(212, 178, 112)" opacity="0.5"/>

    <!-- Classical column hints (residential work) -->
    <rect x="300" y="300" width="16" height="70" fill="rgb(82, 90, 100)"/>
    <rect x="484" y="300" width="16" height="70" fill="rgb(82, 90, 100)"/>
    <rect x="295" y="295" width="26" height="10" fill="rgb(82, 90, 100)"/>
    <rect x="479" y="295" width="26" height="10" fill="rgb(82, 90, 100)"/>
  </g>

  <!-- Portrait -->
  <g class="portrait-main" transform="translate(200, 0)">
    <!-- Face - Distinguished oval with strong jaw -->
    <ellipse cx="400" cy="200" rx="65" ry="85" fill="url(#face-grad-kahn)" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Strong jawline overlay -->
    <polygon points="350,230 345,270 400,290 455,270 450,230"
      fill="rgb(168, 132, 98)" stroke="rgb(55, 52, 50)" stroke-width="1"/>

    <!-- Hair - Receding, distinguished early 1900s style -->
    <ellipse cx="400" cy="125" rx="55" ry="25" fill="rgb(55, 52, 50)"/>
    <ellipse cx="365" cy="135" rx="20" ry="15" fill="rgb(82, 90, 100)"/>
    <ellipse cx="435" cy="135" rx="20" ry="15" fill="rgb(82, 90, 100)"/>

    <!-- Balding forehead -->
    <ellipse cx="400" cy="140" rx="40" ry="20" fill="rgb(232, 218, 195)"/>

    <!-- Forehead wrinkles - wisdom of experience -->
    <line x1="370" y1="150" x2="430" y2="150" stroke="rgb(55, 52, 50)" stroke-width="1" opacity="0.3"/>
    <line x1="375" y1="157" x2="425" y2="157" stroke="rgb(55, 52, 50)" stroke-width="1" opacity="0.25"/>

    <!-- Eyes - Thoughtful, experienced -->
    <g class="eyes">
      <ellipse cx="375" cy="185" rx="18" ry="10" fill="rgb(252, 250, 247)" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <ellipse cx="425" cy="185" rx="18" ry="10" fill="rgb(252, 250, 247)" stroke="rgb(55, 52, 50)" stroke-width="1"/>
      <circle cx="375" cy="185" r="7" fill="rgb(55, 52, 50)"/>
      <circle cx="425" cy="185" r="7" fill="rgb(55, 52, 50)"/>
      <circle cx="376" cy="184" r="2" fill="rgb(212, 178, 112)" class="accent"/>
      <circle cx="426" cy="184" r="2" fill="rgb(212, 178, 112)" class="accent"/>
    </g>

    <!-- Distinguished eyebrows -->
    <path d="M 355 172 Q 375 165 392 170" fill="none" stroke="rgb(55, 52, 50)" stroke-width="3"/>
    <path d="M 408 170 Q 425 165 445 172" fill="none" stroke="rgb(55, 52, 50)" stroke-width="3"/>

    <!-- Nose - Strong, distinguished -->
    <polygon points="400,195 410,230 400,238 390,230" fill="rgb(138, 105, 75)"/>

    <!-- Nostrils hint -->
    <ellipse cx="394" cy="232" rx="4" ry="2" fill="rgb(55, 52, 50)" opacity="0.3"/>
    <ellipse cx="406" cy="232" rx="4" ry="2" fill="rgb(55, 52, 50)" opacity="0.3"/>

    <!-- Mustache - Early 1900s style -->
    <path d="M 370 245 Q 385 252 400 248 Q 415 252 430 245"
      fill="rgb(55, 52, 50)" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    <path d="M 375 248 Q 400 255 425 248"
      fill="rgb(82, 90, 100)" opacity="0.5"/>

    <!-- Mouth - Serious, determined -->
    <line x1="382" y1="258" x2="418" y2="258" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Ears -->
    <ellipse cx="338" cy="200" rx="10" ry="18" fill="rgb(168, 132, 98)" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    <ellipse cx="462" cy="200" rx="10" ry="18" fill="rgb(168, 132, 98)" stroke="rgb(55, 52, 50)" stroke-width="1"/>

    <!-- High collar and formal suit (early 1900s) -->
    <polygon points="345,285 400,310 455,285 470,380 330,380" fill="rgb(55, 52, 50)"/>

    <!-- White dress shirt collar -->
    <polygon points="375,290 400,315 425,290 415,305 400,300 385,305" fill="rgb(252, 250, 247)"/>

    <!-- Tie -->
    <polygon points="392,300 400,305 408,300 405,350 400,355 395,350" fill="rgb(194, 114, 84)"/>
    <polygon points="395,305 400,310 405,305" fill="rgb(156, 88, 64)"/>

    <!-- Suit lapels -->
    <polygon points="345,285 375,290 365,340 335,340" fill="rgb(82, 90, 100)" stroke="rgb(55, 52, 50)" stroke-width="1"/>
    <polygon points="455,285 425,290 435,340 465,340" fill="rgb(82, 90, 100)" stroke="rgb(55, 52, 50)" stroke-width="1"/>
  </g>

  <!-- Industrial baseline accent -->
  <g class="accent">
    <rect x="510" y="372" width="180" height="6" fill="rgb(55, 52, 50)"/>
    <rect x="530" y="380" width="40" height="10" fill="rgb(194, 114, 84)"/>
    <rect x="580" y="380" width="40" height="10" fill="rgb(212, 178, 112)"/>
    <rect x="630" y="380" width="40" height="10" fill="rgb(194, 114, 84)"/>
  </g>
</svg>