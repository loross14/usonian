<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .accent { animation: pulse 4s ease-in-out infinite; }
    .portrait-main { transform-origin: center center; }
    
      .portrait-main { animation: breathe 8s ease-in-out infinite; transform-origin: center center; }
    </style>
    <linearGradient id="face-grad-dyson" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(168, 132, 98);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(156, 88, 64);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Warm White Background -->
  <rect width="400" height="400" fill="rgb(252, 250, 247)"/>

  <!-- Dynamic angular background - organic architecture reference -->
  <g class="building-accent" opacity="0.1" transform="translate(0, 0)">
    <polygon points="80,50 120,30 140,80 100,100" fill="rgb(194, 114, 84)"/>
    <polygon points="260,40 320,60 300,110 250,90" fill="rgb(82, 90, 100)"/>
    <polygon points="120,320 170,300 180,370 110,380" fill="rgb(168, 132, 98)"/>
    <polygon points="220,310 290,330 280,380 210,360" fill="rgb(212, 178, 112)"/>
  </g>

  <!-- Portrait - Dynamic angular composition -->
  <g class="portrait-main" transform="translate(0, 0)">
    <!-- Face - Dynamic asymmetric polygon -->
    <polygon points="190,100 255,130 270,190 260,260 220,295 160,285 135,220 140,150"
      fill="url(#face-grad-dyson)" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Hair - Dynamic flowing angles -->
    <polygon points="140,150 160,90 220,80 260,115 255,130 190,100"
      fill="rgb(55, 52, 50)"/>
    <polygon points="160,90 190,85 220,80 200,100"
      fill="rgb(82, 90, 100)"/>

    <!-- Eyes - Angular, expressive -->
    <polygon points="160,170 190,165 190,180 160,182" fill="rgb(55, 52, 50)"/>
    <polygon points="210,165 245,175 245,188 210,180" fill="rgb(55, 52, 50)"/>
    <polygon points="165,172 175,172 175,178 165,178" fill="rgb(212, 178, 112)" class="accent"/>
    <polygon points="215,170 228,175 228,182 215,178" fill="rgb(212, 178, 112)" class="accent"/>

    <!-- Eyebrows - Dynamic angles -->
    <line x1="155" y1="158" x2="195" y2="152" stroke="rgb(55, 52, 50)" stroke-width="3"/>
    <line x1="205" y1="150" x2="250" y2="162" stroke="rgb(55, 52, 50)" stroke-width="3"/>

    <!-- Nose - Angular, prominent -->
    <polygon points="200,180 218,225 205,235 192,230" fill="rgb(138, 105, 75)"/>

    <!-- Mouth - Confident line -->
    <line x1="180" y1="255" x2="230" y2="250" stroke="rgb(55, 52, 50)" stroke-width="3"/>

    <!-- Beard stubble suggestion -->
    <polygon points="170,260 235,255 220,295 160,285" fill="rgb(82, 90, 100)" opacity="0.3"/>

    <!-- Collar - Dynamic angular -->
    <polygon points="160,285 220,295 240,380 140,380" fill="rgb(82, 90, 100)"/>
    <polygon points="190,295 205,330 220,295" fill="rgb(252, 250, 247)"/>
  </g>

  <!-- Dynamic line accent -->
  <g class="accent">
    <line x1="120" y1="370" x2="180" y2="375" stroke="rgb(194, 114, 84)" stroke-width="3"/>
    <line x1="180" y1="375" x2="250" y2="365" stroke="rgb(212, 178, 112)" stroke-width="3"/>
    <line x1="250" y1="365" x2="290" y2="372" stroke="rgb(168, 132, 98)" stroke-width="3"/>
  </g>
</svg>