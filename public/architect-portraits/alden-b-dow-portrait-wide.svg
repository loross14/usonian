<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .accent { animation: pulse 4s ease-in-out infinite; }
    .portrait-main { transform-origin: center center; }
    </style>
  </defs>

  <!-- Warm White Background -->
  <rect width="800" height="400" fill="rgb(252, 250, 247)"/>

  <!-- Interlocking blocks pattern background (Dow Studio reference) -->
  <g class="building-accent" opacity="0.08" transform="translate(200, 0)">
    <rect x="280" y="40" width="60" height="40" fill="rgb(194, 114, 84)"/>
    <rect x="340" y="60" width="60" height="40" fill="rgb(168, 132, 98)"/>
    <rect x="400" y="40" width="60" height="40" fill="rgb(82, 90, 100)"/>
    <rect x="460" y="60" width="60" height="40" fill="rgb(194, 114, 84)"/>
    <rect x="300" y="320" width="50" height="30" fill="rgb(168, 132, 98)"/>
    <rect x="350" y="340" width="50" height="30" fill="rgb(82, 90, 100)"/>
    <rect x="400" y="320" width="50" height="30" fill="rgb(194, 114, 84)"/>
    <rect x="450" y="340" width="50" height="30" fill="rgb(168, 132, 98)"/>
  </g>

  <!-- Portrait - Interlocking block composition -->
  <g class="portrait-main" transform="translate(200, 0)">
    <!-- Face blocks - interlocking geometric composition -->
    <rect x="350" y="110" width="100" height="35" fill="rgb(168, 132, 98)" stroke="rgb(55, 52, 50)" stroke-width="2"/>
    <rect x="340" y="145" width="55" height="50" fill="rgb(138, 105, 75)" stroke="rgb(55, 52, 50)" stroke-width="2"/>
    <rect x="405" y="145" width="55" height="50" fill="rgb(168, 132, 98)" stroke="rgb(55, 52, 50)" stroke-width="2"/>
    <rect x="345" y="195" width="110" height="45" fill="rgb(232, 218, 195)" stroke="rgb(55, 52, 50)" stroke-width="2"/>
    <rect x="355" y="240" width="90" height="40" fill="rgb(168, 132, 98)" stroke="rgb(55, 52, 50)" stroke-width="2"/>
    <rect x="365" y="280" width="70" height="25" fill="rgb(138, 105, 75)" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Hair blocks -->
    <rect x="345" y="80" width="45" height="30" fill="rgb(55, 52, 50)"/>
    <rect x="390" y="75" width="35" height="35" fill="rgb(82, 90, 100)"/>
    <rect x="425" y="80" width="30" height="30" fill="rgb(55, 52, 50)"/>

    <!-- Eyes as geometric blocks -->
    <rect x="355" y="155" width="28" height="12" fill="rgb(55, 52, 50)"/>
    <rect x="417" y="155" width="28" height="12" fill="rgb(55, 52, 50)"/>
    <rect x="358" y="158" width="8" height="6" fill="rgb(212, 178, 112)" class="accent"/>
    <rect x="420" y="158" width="8" height="6" fill="rgb(212, 178, 112)" class="accent"/>

    <!-- Glasses - rectangular frames -->
    <rect x="350" y="148" width="38" height="24" fill="none" stroke="rgb(55, 52, 50)" stroke-width="3"/>
    <rect x="412" y="148" width="38" height="24" fill="none" stroke="rgb(55, 52, 50)" stroke-width="3"/>
    <line x1="388" y1="160" x2="412" y2="160" stroke="rgb(55, 52, 50)" stroke-width="3"/>

    <!-- Nose block -->
    <rect x="392" y="200" width="16" height="30" fill="rgb(194, 114, 84)" stroke="rgb(55, 52, 50)" stroke-width="1"/>

    <!-- Mouth -->
    <rect x="380" y="255" width="40" height="6" fill="rgb(55, 52, 50)"/>

    <!-- Collar blocks -->
    <rect x="345" y="305" width="50" height="60" fill="rgb(82, 90, 100)"/>
    <rect x="405" y="305" width="50" height="60" fill="rgb(82, 90, 100)"/>
    <polygon points="395,305 400,330 405,305" fill="rgb(252, 250, 247)"/>
  </g>

  <!-- Block accent baseline -->
  <g class="accent">
    <rect x="540" y="375" width="20" height="10" fill="rgb(194, 114, 84)"/>
    <rect x="570" y="375" width="20" height="10" fill="rgb(168, 132, 98)"/>
    <rect x="600" y="375" width="20" height="10" fill="rgb(82, 90, 100)"/>
    <rect x="630" y="375" width="20" height="10" fill="rgb(212, 178, 112)"/>
  </g>
</svg>