<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .accent { animation: pulse 4s ease-in-out infinite; }
    .portrait-main { transform-origin: center center; }
    </style>
    <linearGradient id="face-grad-tafel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(232, 218, 195);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(168, 132, 98);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Warm White Background -->
  <rect width="800" height="400" fill="rgb(252, 250, 247)"/>

  <!-- Drafting tools background -->
  <g class="building-accent" opacity="0.12" transform="translate(200, 0)">
    <!-- T-square -->
    <rect x="250" y="60" width="300" height="8" fill="rgb(168, 132, 98)"/>
    <rect x="250" y="55" width="15" height="80" fill="rgb(168, 132, 98)"/>
    <!-- Triangle -->
    <polygon points="480,320 550,380 410,380" fill="none" stroke="rgb(55, 52, 50)" stroke-width="2"/>
    <!-- Compass hint -->
    <circle cx="310" cy="340" r="30" fill="none" stroke="rgb(212, 178, 112)" stroke-width="2"/>
  </g>

  <!-- Portrait -->
  <g class="portrait-main" transform="translate(200, 0)">
    <!-- Face - Classic hexagonal -->
    <polygon points="400,105 460,140 465,230 445,280 400,300 355,280 335,230 340,140"
      fill="url(#face-grad-tafel)" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Hair - Receding, distinguished -->
    <polygon points="350,130 370,100 430,100 450,130 440,115 400,105 360,115"
      fill="rgb(82, 90, 100)"/>

    <!-- Forehead wrinkles - wisdom lines -->
    <line x1="370" y1="125" x2="430" y2="125" stroke="rgb(55, 52, 50)" stroke-width="1" opacity="0.4"/>
    <line x1="375" y1="132" x2="425" y2="132" stroke="rgb(55, 52, 50)" stroke-width="1" opacity="0.3"/>

    <!-- Eyes - Thoughtful rectangles -->
    <rect x="355" y="170" width="30" height="14" fill="rgb(55, 52, 50)" rx="2"/>
    <rect x="415" y="170" width="30" height="14" fill="rgb(55, 52, 50)" rx="2"/>
    <rect x="358" y="173" width="8" height="5" fill="rgb(212, 178, 112)" class="accent"/>
    <rect x="418" y="173" width="8" height="5" fill="rgb(212, 178, 112)" class="accent"/>

    <!-- Eyebrows - Distinguished -->
    <line x1="352" y1="160" x2="388" y2="158" stroke="rgb(55, 52, 50)" stroke-width="3"/>
    <line x1="412" y1="158" x2="448" y2="160" stroke="rgb(55, 52, 50)" stroke-width="3"/>

    <!-- Nose - Classic proportions -->
    <polygon points="400,185 412,230 400,235 388,230" fill="rgb(138, 105, 75)"/>

    <!-- Mouth - Slight smile -->
    <path d="M 378 255 Q 400 262 422 255" fill="none" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Bow tie - Classic drafting room attire -->
    <polygon points="365,315 385,305 385,325" fill="rgb(194, 114, 84)"/>
    <polygon points="435,315 415,305 415,325" fill="rgb(194, 114, 84)"/>
    <circle cx="400" cy="315" r="8" fill="rgb(156, 88, 64)"/>

    <!-- Collar and jacket -->
    <polygon points="355,300 385,305 340,380 300,380" fill="rgb(55, 52, 50)"/>
    <polygon points="445,300 415,305 460,380 500,380" fill="rgb(55, 52, 50)"/>
    <polygon points="385,305 400,340 415,305" fill="rgb(252, 250, 247)"/>
  </g>

  <!-- Drafting pencil accent -->
  <g class="accent" transform="translate(200, 0)">
    <rect x="460" y="350" width="80" height="6" fill="rgb(212, 178, 112)" transform="rotate(-15, 500, 353)"/>
    <polygon points="542,348 555,353 542,358" fill="rgb(55, 52, 50)" transform="rotate(-15, 500, 353)"/>
  </g>
</svg>