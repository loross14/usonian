<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .accent { animation: pulse 4s ease-in-out infinite; }
    .portrait-main { transform-origin: center center; }
    </style>
    <linearGradient id="face-grad-jones" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(168, 132, 98);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(138, 105, 75);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Warm White Background -->
  <rect width="800" height="400" fill="rgb(252, 250, 247)"/>

  <!-- Thorncrown Chapel spires background pattern -->
  <g class="building-accent" opacity="0.1" transform="translate(200, 0)">
    <line x1="320" y1="400" x2="340" y2="40" stroke="rgb(212, 178, 112)" stroke-width="3"/>
    <line x1="360" y1="400" x2="370" y2="20" stroke="rgb(212, 178, 112)" stroke-width="3"/>
    <line x1="400" y1="400" x2="400" y2="10" stroke="rgb(212, 178, 112)" stroke-width="4"/>
    <line x1="440" y1="400" x2="430" y2="20" stroke="rgb(212, 178, 112)" stroke-width="3"/>
    <line x1="480" y1="400" x2="460" y2="40" stroke="rgb(212, 178, 112)" stroke-width="3"/>
    <!-- Cross beams -->
    <line x1="310" y1="100" x2="490" y2="100" stroke="rgb(168, 132, 98)" stroke-width="2"/>
    <line x1="330" y1="180" x2="470" y2="180" stroke="rgb(168, 132, 98)" stroke-width="2"/>
    <line x1="350" y1="260" x2="450" y2="260" stroke="rgb(168, 132, 98)" stroke-width="2"/>
  </g>

  <!-- Portrait - Profile facing right -->
  <g class="portrait-main" transform="translate(200, 0)">
    <!-- Head profile - pentagon shape -->
    <polygon points="370,120 440,140 460,200 430,270 370,260 350,200"
      fill="url(#face-grad-jones)" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Hair - swept back geometric -->
    <polygon points="370,120 340,130 330,170 350,200 370,260 350,200 360,150"
      fill="rgb(82, 90, 100)"/>

    <!-- Eye - profile view -->
    <polygon points="410,180 430,185 410,190" fill="rgb(55, 52, 50)"/>
    <circle cx="415" cy="185" r="3" fill="rgb(212, 178, 112)" class="accent"/>

    <!-- Eyebrow -->
    <line x1="405" y1="170" x2="435" y2="175" stroke="rgb(55, 52, 50)" stroke-width="3"/>

    <!-- Nose - profile angular -->
    <polygon points="460,200 475,210 460,220 450,215" fill="rgb(138, 105, 75)"/>

    <!-- Mouth -->
    <line x1="445" y1="240" x2="465" y2="238" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Ear -->
    <ellipse cx="365" cy="200" rx="12" ry="18" fill="rgb(168, 132, 98)" stroke="rgb(55, 52, 50)" stroke-width="1"/>

    <!-- Collar -->
    <polygon points="350,260 430,270 440,350 340,350" fill="rgb(194, 114, 84)"/>
    <line x1="390" y1="270" x2="380" y2="350" stroke="rgb(55, 52, 50)" stroke-width="2"/>
  </g>

  <!-- Chapel spire accent -->
  <polygon points="600,375 592,390 608,390" fill="rgb(212, 178, 112)" class="accent"/>
</svg>