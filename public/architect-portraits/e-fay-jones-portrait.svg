<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .accent { animation: pulse 4s ease-in-out infinite; }
    .portrait-main { transform-origin: center center; }
    </style>
    <linearGradient id="face-grad-jones" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(168, 132, 98);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(138, 105, 75);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Warm White Background -->
  <rect width="400" height="400" fill="rgb(252, 250, 247)"/>

  <!-- Thorncrown Chapel spires background pattern -->
  <g class="building-accent" opacity="0.1" transform="translate(0, 0)">
    <line x1="120" y1="400" x2="140" y2="40" stroke="rgb(212, 178, 112)" stroke-width="3"/>
    <line x1="160" y1="400" x2="170" y2="20" stroke="rgb(212, 178, 112)" stroke-width="3"/>
    <line x1="200" y1="400" x2="200" y2="10" stroke="rgb(212, 178, 112)" stroke-width="4"/>
    <line x1="240" y1="400" x2="230" y2="20" stroke="rgb(212, 178, 112)" stroke-width="3"/>
    <line x1="280" y1="400" x2="260" y2="40" stroke="rgb(212, 178, 112)" stroke-width="3"/>
    <!-- Cross beams -->
    <line x1="110" y1="100" x2="290" y2="100" stroke="rgb(168, 132, 98)" stroke-width="2"/>
    <line x1="130" y1="180" x2="270" y2="180" stroke="rgb(168, 132, 98)" stroke-width="2"/>
    <line x1="150" y1="260" x2="250" y2="260" stroke="rgb(168, 132, 98)" stroke-width="2"/>
  </g>

  <!-- Portrait - Profile facing right -->
  <g class="portrait-main" transform="translate(0, 0)">
    <!-- Head profile - pentagon shape -->
    <polygon points="170,120 240,140 260,200 230,270 170,260 150,200"
      fill="url(#face-grad-jones)" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Hair - swept back geometric -->
    <polygon points="170,120 140,130 130,170 150,200 170,260 150,200 160,150"
      fill="rgb(82, 90, 100)"/>

    <!-- Eye - profile view -->
    <polygon points="210,180 230,185 210,190" fill="rgb(55, 52, 50)"/>
    <circle cx="215" cy="185" r="3" fill="rgb(212, 178, 112)" class="accent"/>

    <!-- Eyebrow -->
    <line x1="205" y1="170" x2="235" y2="175" stroke="rgb(55, 52, 50)" stroke-width="3"/>

    <!-- Nose - profile angular -->
    <polygon points="260,200 275,210 260,220 250,215" fill="rgb(138, 105, 75)"/>

    <!-- Mouth -->
    <line x1="245" y1="240" x2="265" y2="238" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Ear -->
    <ellipse cx="165" cy="200" rx="12" ry="18" fill="rgb(168, 132, 98)" stroke="rgb(55, 52, 50)" stroke-width="1"/>

    <!-- Collar -->
    <polygon points="150,260 230,270 240,350 140,350" fill="rgb(194, 114, 84)"/>
    <line x1="190" y1="270" x2="180" y2="350" stroke="rgb(55, 52, 50)" stroke-width="2"/>
  </g>

  <!-- Chapel spire accent -->
  <polygon points="200,375 192,390 208,390" fill="rgb(212, 178, 112)" class="accent"/>
</svg>