<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .accent { animation: pulse 4s ease-in-out infinite; }
    .portrait-main { transform-origin: center center; }
    </style>
    <linearGradient id="face-grad-elwright" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(232, 218, 195);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(168, 132, 98);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Warm White Background -->
  <rect width="400" height="400" fill="rgb(252, 250, 247)"/>

  <!-- Prairie horizontal lines background -->
  <g class="building-accent" opacity="0.15" transform="translate(0, 0)">
    <line x1="20" y1="80" x2="380" y2="80" stroke="rgb(194, 114, 84)" stroke-width="4"/>
    <line x1="40" y1="95" x2="360" y2="95" stroke="rgb(168, 132, 98)" stroke-width="3"/>
    <line x1="60" y1="108" x2="340" y2="108" stroke="rgb(194, 114, 84)" stroke-width="2"/>

    <line x1="20" y1="320" x2="380" y2="320" stroke="rgb(194, 114, 84)" stroke-width="4"/>
    <line x1="40" y1="335" x2="360" y2="335" stroke="rgb(168, 132, 98)" stroke-width="3"/>
    <line x1="60" y1="348" x2="340" y2="348" stroke="rgb(194, 114, 84)" stroke-width="2"/>
  </g>

  <!-- Portrait - Profile facing left (opposite direction from E. Fay Jones) -->
  <g class="portrait-main" transform="translate(0, 0)">
    <!-- Head profile - strong horizontal emphasis -->
    <polygon points="230,120 150,135 130,190 150,260 220,275 240,210"
      fill="url(#face-grad-elwright)" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Hair - Horizontal swept style -->
    <polygon points="230,120 260,110 270,150 250,180 240,210 240,160"
      fill="rgb(55, 52, 50)"/>
    <rect x="235" y="115" width="40" height="8" fill="rgb(82, 90, 100)"/>

    <!-- Horizontal accent lines across forehead -->
    <line x1="160" y1="145" x2="225" y2="140" stroke="rgb(55, 52, 50)" stroke-width="1" opacity="0.3"/>

    <!-- Eye - profile view facing left -->
    <polygon points="180,175 155,182 180,188" fill="rgb(55, 52, 50)"/>
    <circle cx="172" cy="182" r="4" fill="rgb(212, 178, 112)" class="accent"/>

    <!-- Strong eyebrow -->
    <line x1="152" y1="168" x2="185" y2="162" stroke="rgb(55, 52, 50)" stroke-width="4"/>

    <!-- Nose - profile, distinguished -->
    <polygon points="130,190 112,205 125,218 140,212" fill="rgb(138, 105, 75)"/>

    <!-- Mouth -->
    <line x1="125" y1="235" x2="150" y2="238" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Ear -->
    <ellipse cx="235" cy="195" rx="12" ry="20" fill="rgb(232, 218, 195)" stroke="rgb(55, 52, 50)" stroke-width="1"/>

    <!-- Collar with prairie horizontal bands -->
    <polygon points="220,275 150,260 130,370 240,370" fill="rgb(82, 90, 100)"/>
    <line x1="140" y1="300" x2="230" y2="295" stroke="rgb(194, 114, 84)" stroke-width="3"/>
    <line x1="145" y1="315" x2="225" y2="310" stroke="rgb(194, 114, 84)" stroke-width="2"/>

    <!-- Shirt collar V -->
    <polygon points="185,260 175,300 165,260" fill="rgb(252, 250, 247)"/>
  </g>

  <!-- Prairie-style horizontal accent baseline -->
  <g class="accent">
    <rect x="100" y="372" width="200" height="4" fill="rgb(194, 114, 84)"/>
    <rect x="120" y="378" width="160" height="3" fill="rgb(168, 132, 98)"/>
    <rect x="140" y="383" width="120" height="2" fill="rgb(194, 114, 84)"/>
  </g>
</svg>