<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .accent { animation: pulse 4s ease-in-out infinite; }
    .portrait-main { transform-origin: center center; }
    
      .portrait-main { animation: breathe 8s ease-in-out infinite; transform-origin: center center; }
    </style>
    <linearGradient id="face-grad-dyson" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(168, 132, 98);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(156, 88, 64);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Warm White Background -->
  <rect width="800" height="400" fill="rgb(252, 250, 247)"/>

  <!-- Dynamic angular background - organic architecture reference -->
  <g class="building-accent" opacity="0.1" transform="translate(200, 0)">
    <polygon points="280,50 320,30 340,80 300,100" fill="rgb(194, 114, 84)"/>
    <polygon points="460,40 520,60 500,110 450,90" fill="rgb(82, 90, 100)"/>
    <polygon points="320,320 370,300 380,370 310,380" fill="rgb(168, 132, 98)"/>
    <polygon points="420,310 490,330 480,380 410,360" fill="rgb(212, 178, 112)"/>
  </g>

  <!-- Portrait - Dynamic angular composition -->
  <g class="portrait-main" transform="translate(200, 0)">
    <!-- Face - Dynamic asymmetric polygon -->
    <polygon points="390,100 455,130 470,190 460,260 420,295 360,285 335,220 340,150"
      fill="url(#face-grad-dyson)" stroke="rgb(55, 52, 50)" stroke-width="2"/>

    <!-- Hair - Dynamic flowing angles -->
    <polygon points="340,150 360,90 420,80 460,115 455,130 390,100"
      fill="rgb(55, 52, 50)"/>
    <polygon points="360,90 390,85 420,80 400,100"
      fill="rgb(82, 90, 100)"/>

    <!-- Eyes - Angular, expressive -->
    <polygon points="360,170 390,165 390,180 360,182" fill="rgb(55, 52, 50)"/>
    <polygon points="410,165 445,175 445,188 410,180" fill="rgb(55, 52, 50)"/>
    <polygon points="365,172 375,172 375,178 365,178" fill="rgb(212, 178, 112)" class="accent"/>
    <polygon points="415,170 428,175 428,182 415,178" fill="rgb(212, 178, 112)" class="accent"/>

    <!-- Eyebrows - Dynamic angles -->
    <line x1="355" y1="158" x2="395" y2="152" stroke="rgb(55, 52, 50)" stroke-width="3"/>
    <line x1="405" y1="150" x2="450" y2="162" stroke="rgb(55, 52, 50)" stroke-width="3"/>

    <!-- Nose - Angular, prominent -->
    <polygon points="400,180 418,225 405,235 392,230" fill="rgb(138, 105, 75)"/>

    <!-- Mouth - Confident line -->
    <line x1="380" y1="255" x2="430" y2="250" stroke="rgb(55, 52, 50)" stroke-width="3"/>

    <!-- Beard stubble suggestion -->
    <polygon points="370,260 435,255 420,295 360,285" fill="rgb(82, 90, 100)" opacity="0.3"/>

    <!-- Collar - Dynamic angular -->
    <polygon points="360,285 420,295 440,380 340,380" fill="rgb(82, 90, 100)"/>
    <polygon points="390,295 405,330 420,295" fill="rgb(252, 250, 247)"/>
  </g>

  <!-- Dynamic line accent -->
  <g class="accent">
    <line x1="520" y1="370" x2="580" y2="375" stroke="rgb(194, 114, 84)" stroke-width="3"/>
    <line x1="580" y1="375" x2="650" y2="365" stroke="rgb(212, 178, 112)" stroke-width="3"/>
    <line x1="650" y1="365" x2="690" y2="372" stroke="rgb(168, 132, 98)" stroke-width="3"/>
  </g>
</svg>